tokenizer: gpt2

model:
  vocab_size: 50257
  block_size: 256
  n_layer: 10
  n_head: 8
  n_embd: 512
  dropout: 0.1
  n_expert: 8
  n_expert_active: 2
  expert_hidden_mult: 4
  moe_aux_loss_coef: 0.01

data:
  dataset_name: databricks/databricks-dolly-15k
  split: train
  block_size: 256
  limit: 15000

train:
  output_dir: gs://minigpt-wzhang-2026/checkpoints/sft-medium
  batch_size: 1
  grad_accum_steps: 16
  learning_rate: 0.00005
  weight_decay: 0.05
  warmup_steps: 50
  max_steps: 3000
  eval_interval: 50
  save_interval: 100
  eval_iters: 10
  val_fraction: 0.05
  mixed_precision: true
  grad_clip: 1.0
