tokenizer: gpt2

model:
  vocab_size: 50257
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.1
  n_expert: 4
  n_expert_active: 2
  expert_hidden_mult: 4
  moe_aux_loss_coef: 0.01

data:
  dataset_name: wikimedia/wikipedia
  dataset_config: 20231101.en
  split: train
  streaming: true
  text_field: text
  block_size: 256
  min_chars: 128
  limit: 2000
  tokenized_path: gs://minigpt-wzhang-2026/datasets/pretrain/wiki_tiny_blocks.pt

train:
  output_dir: gs://minigpt-wzhang-2026/checkpoints/pretrain-tiny
  batch_size: 2
  grad_accum_steps: 8
  learning_rate: 0.0003
  weight_decay: 0.1
  warmup_steps: 10
  max_steps: 100
  eval_interval: 10
  save_interval: 25
  eval_iters: 5
  val_fraction: 0.05
  mixed_precision: true
  grad_clip: 1.0
