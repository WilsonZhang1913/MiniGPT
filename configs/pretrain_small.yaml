tokenizer: gpt2

model:
  vocab_size: 50257
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.1
  n_expert: 4
  n_expert_active: 2
  expert_hidden_mult: 4
  moe_aux_loss_coef: 0.01

data:
  dataset_name: wikimedia/wikipedia
  dataset_config: 20231101.en
  split: train
  streaming: true
  text_field: text
  block_size: 256
  min_chars: 128
  limit: 10000
  tokenized_path: gs://minigpt-wzhang-2026/datasets/pretrain/wiki_small_blocks.pt

train:
  output_dir: gs://minigpt-wzhang-2026/checkpoints/pretrain-small
  batch_size: 2
  grad_accum_steps: 8
  learning_rate: 0.0003
  weight_decay: 0.1
  warmup_steps: 100
  max_steps: 1000
  eval_interval: 50
  save_interval: 100
  eval_iters: 10
  val_fraction: 0.05
  mixed_precision: true
  grad_clip: 1.0
